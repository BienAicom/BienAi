<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bien AI - VA Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        body { 
            background-color: #000; 
            color: white; 
            overflow-x: hidden; 
            font-family: sans-serif;
            /* Added subtle grid lines like your reference images */
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 40px;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .level-bar { height: 6px; background: #27272a; border-radius: 10px; overflow: hidden; width: 100px; }
        .level-progress { height: 100%; background: #FACC15; transition: width 0.5s ease; }
        
        /* Glassmorphism effect */
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="hide-scroll">

    <header id="mainHeader" class="hidden fixed top-0 left-0 right-0 glass z-50 px-6 py-4 border-b border-zinc-800">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-8">
                <h1 class="text-2xl font-black text-yellow-400 tracking-tighter leading-none cursor-pointer">BIEN AI</h1>
                
                <nav class="hidden md:flex items-center gap-6 text-[11px] font-bold uppercase tracking-widest text-zinc-400">
                    <button onclick="switchTab('program')" class="hover:text-yellow-400 transition-colors">Program</button>
                    <button onclick="switchTab('course')" class="hover:text-yellow-400 transition-colors">Course</button>
                    <button onclick="switchTab('tools')" class="hover:text-yellow-400 transition-colors">Tools</button>
                    <button onclick="switchTab('chats')" class="hover:text-yellow-400 transition-colors">Chats</button>
                </nav>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col items-end">
                    <span class="text-[10px] font-bold text-zinc-500 uppercase">Progress: <span id="lvlDisplay">1</span>/20</span>
                    <div class="level-bar mt-1"><div id="lvlBar" class="level-progress" style="width: 5%;"></div></div>
                </div>
                <button onclick="switchTab('settings')" class="p-2 rounded-full hover:bg-zinc-800 text-zinc-400 hover:text-yellow-400 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>
        </div>
    </header>

    <div id="splash" class="fixed inset-0 flex flex-col items-center justify-center z-[100] bg-black">
        <h1 class="text-6xl font-black tracking-tighter text-yellow-400 animate-pulse">BIEN AI</h1>
        <p class="text-zinc-500 mt-4 tracking-widest text-sm uppercase">Loading Excellence</p>
    </div>

    <main id="app" class="hidden min-h-screen container mx-auto px-6 flex flex-col pt-24 pb-24 md:pb-12">
        <div id="content" class="fade-in flex-grow py-8 max-w-4xl mx-auto w-full">
            </div>
        
        <div id="footer-area" class="mt-auto max-w-md mx-auto w-full">
            <button id="nextBtn" class="w-full bg-yellow-400 text-black font-black py-5 rounded-2xl text-lg hover:scale-[0.98] active:scale-95 transition-all uppercase shadow-[0_0_20px_rgba(250,204,21,0.3)]">CONTINUE</button>
        </div>
    </main>

    <nav id="bottomNav" class="hidden md:hidden fixed bottom-0 left-0 right-0 glass border-t border-zinc-800 px-4 py-3 z-50">
        <div class="flex justify-between items-center text-zinc-500">
            <button onclick="switchTab('program')" id="nav-program" class="flex flex-col items-center gap-1 flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <span class="text-[9px] font-bold uppercase">Program</span>
            </button>
            <button onclick="switchTab('course')" id="nav-course" class="flex flex-col items-center gap-1 flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                <span class="text-[9px] font-bold uppercase">Course</span>
            </button>
            <button onclick="switchTab('tools')" id="nav-tools" class="flex flex-col items-center gap-1 flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"></path><path d="m3.34 19 1.4-1.4a2.12 2.12 0 0 1 3 0l1.27 1.27"></path><path d="m16 6 4-4"></path><path d="m19.03 19.03-1.04-1.04"></path><path d="M14.5 10a2.12 2.12 0 0 1 0 3l-5 5a2.12 2.12 0 0 1-3 0l-3-3a2.12 2.12 0 0 1 0-3l5-5a2.12 2.12 0 0 1 3 0z"></path></svg>
                <span class="text-[9px] font-bold uppercase">Tools</span>
            </button>
            <button onclick="switchTab('chats')" id="nav-chats" class="flex flex-col items-center gap-1 flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"></path></svg>
                <span class="text-[9px] font-bold uppercase">Chats</span>
            </button>
        </div>
    </nav>

    <script src="courses.js"></script>
    <script src="script.js"></script>
</body>
</html>
